name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build:
    name: Build and inspect distributions
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install release tooling
        run: python -m pip install --upgrade build twine

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
            tag="v${version}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Check release metadata
        run: python scripts/check_release.py --tag "${{ steps.release.outputs.tag }}"

      - name: Build wheel and source distribution
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check --strict dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  install-test:
    name: Install test (Python ${{ matrix.python-version }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install wheel in a clean environment
        run: python -m pip install dist/*.whl

      - name: Smoke test installed CLI
        run: |
          test "$(omac --version)" = "omac ${{ needs.build.outputs.version }}"
          omac --help | grep -F "oh-my-multica"

  publish-pypi:
    name: Publish to PyPI
    if: github.ref_type == 'tag'
    needs: install-test
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/oh-my-multica
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  github-release:
    name: Create GitHub Release
    if: github.ref_type == 'tag'
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish verified distributions
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --verify-tag \
            --title "oh-my-multica ${GITHUB_REF_NAME}" \
            --notes-file "docs/releases/${version}.md"
